<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Furbis Design</title>
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f12;
  --surface: #161a1f;
  --surface2: #1e232a;
  --border: rgba(255,255,255,0.08);
  --accent: #3b82f6;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
  background: var(--bg); color: var(--text); 
  font-family: 'Golos Text', sans-serif; 
  padding-bottom: 100px; /* Отступ под нижнее меню */
}

/* Header */
.header {
  padding: 24px 16px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.header-title { font-family: 'Unbounded'; font-size: 20px; font-weight: 700; }

/* Sync Status Bar */
.sync-status {
  margin: 0 16px 16px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
}
.sync-status.ok { border-color: var(--green); color: var(--green); }
.sync-status.err { border-color: var(--red); color: var(--red); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* Search Area */
.search-container { padding: 0 16px 16px; }
.search-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none;
}
.search-input:focus { border-color: var(--accent); }

/* Bottom Nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(22, 26, 31, 0.98); backdrop-filter: blur(15px);
  display: flex; justify-content: space-around; padding: 12px 10px 28px;
  border-top: 1px solid var(--border); z-index: 1000;
}
.nav-item {
  color: var(--muted); text-decoration: none; font-size: 11px;
  display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 500;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; margin-bottom: 2px; }

/* Order Card */
.order-card {
  background: var(--surface); margin: 0 16px 12px; padding: 16px;
  border-radius: 16px; border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.order-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent;
}
.s-work::before { background: var(--amber); }
.s-done::before { background: var(--green); }

.card-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.client-name { font-weight: 600; font-size: 17px; }
.card-items { color: var(--muted); font-size: 13px; margin-bottom: 12px; line-height: 1.4; }

.card-data {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 10px;
}
.price-val { font-weight: 700; color: var(--text); }
.profit-val { font-weight: 600; font-size: 13px; color: var(--green); }

.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pill { font-size: 10px; padding: 3px 7px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
.p-red { background: rgba(239, 68, 68, 0.1); color: var(--red); }
.p-amber { background: rgba(245, 158, 11, 0.1); color: var(--amber); }

/* Global components */
.page { display: none; }
.page.active { display: block; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
.b-new { background: var(--accent); }
.b-work { background: var(--amber); color: #000; }
.b-done { background: var(--green); color: #000; }
.btn-fab { 
    position: fixed; bottom: 100px; right: 20px; 
    width: 56px; height: 56px; border-radius: 28px; 
    background: var(--accent); color: #fff; border: none;
    font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">FURBI DESIGN</div>
  <div id="orders-count" style="font-size: 12px; color: var(--muted);"></div>
</div>

<div id="sync-status-bar" class="sync-status">
  <div class="sync-dot"></div>
  <span id="sync-status-text">Загрузка...</span>
</div>

<div id="page-orders" class="page active">
  <div class="search-container">
    <input type="text" id="order-search" class="search-input" placeholder="Поиск по имени или изделию..." oninput="renderOrders()">
  </div>
  <div id="orders-list"></div>
</div>

<div id="page-settings" class="page" style="padding: 20px;">
  <h2 class="unbounded" style="margin-bottom: 20px;">Настройки Gist</h2>
  <input type="password" id="gist-token" placeholder="GitHub Token" style="width:100%; padding:12px; background:var(--surface); border:1px solid var(--border); color:#fff; border-radius:8px; margin-bottom:10px;">
  <input type="text" id="gist-id" placeholder="Gist ID" style="width:100%; padding:12px; background:var(--surface); border:1px solid var(--border); color:#fff; border-radius:8px; margin-bottom:20px;">
  <button onclick="saveGistCreds()" style="width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-weight:700;">Сохранить и синхронизировать</button>
  <button onclick="syncUp()" style="width:100%; padding:14px; background:var(--surface2); color:#fff; border:none; border-radius:12px; font-weight:700; margin-top:10px;">Выгрузить в облако ↑</button>
</div>

<nav class="nav">
  <a href="#" class="nav-item active" onclick="showPage('orders', this)">
    <span class="nav-icon">📋</span><span>Заказы</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('add', this)">
    <span class="nav-icon">➕</span><span>Создать</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('stats', this)">
    <span class="nav-icon">📊</span><span>Итоги</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('settings', this)">
    <span class="nav-icon">⚙️</span><span>Облако</span>
  </a>
</nav>

<script>
// --- КОНСТАНТЫ И ДАННЫЕ ---
const KEY = 'furbis_orders';
const GIST_TOKEN_KEY = 'furbis_gist_token';
const GIST_ID_KEY = 'furbis_gist_id';

let orders = JSON.parse(localStorage.getItem(KEY) || '[]');

function save() { localStorage.setItem(KEY, JSON.stringify(orders)); }

// --- ТВОЯ ЛОГИКА РАСЧЕТОВ ---
function fmt(n) { return Math.round(n || 0).toLocaleString('ru-RU'); }

function getOrderTotals(o) {
  const total = (o.items || []).reduce((s, i) => s + Number(i.price || 0), 0);
  const materials = (o.items || []).reduce((s, i) => s + Number(i.material || 0), 0);
  const masterBase = Number(o.masterTotal || 0);
  const tax = total * 0.06;
  const profit = total - masterBase - materials - tax;
  
  const clientPaid = (o.clientPayments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  const masterPaid = (o.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  
  return { total, profit, clientDebt: total - clientPaid, masterDebt: masterBase - masterPaid };
}

// --- ОТРИСОВКА ---
function renderOrders() {
  const list = document.getElementById('orders-list');
  const search = document.getElementById('order-search').value.toLowerCase();
  
  const filtered = orders.filter(o => 
    o.client.toLowerCase().includes(search) || 
    (o.items && o.items.some(i => i.name.toLowerCase().includes(search)))
  );

  document.getElementById('orders-count').textContent = `Всего: ${filtered.length}`;

  list.innerHTML = filtered.sort((a,b) => new Date(b.date || 0) - new Date(a.date || 0)).map(o => {
    const { total, profit, clientDebt, masterDebt } = getOrderTotals(o);
    const statusClass = o.status === 'work' ? 's-work' : (o.status === 'done' ? 's-done' : '');

    return `
      <div class="order-card ${statusClass}" onclick="alert('Детали заказа доступны в консоли (в разработке)')">
        <div class="card-top">
          <span class="client-name">${o.client}</span>
          <span class="badge b-${o.status}">${o.status === 'work' ? 'В работе' : (o.status === 'done' ? 'Готов' : 'Новый')}</span>
        </div>
        <div class="card-items">${(o.items || []).map(i => i.name).join(', ') || 'Состав не указан'}</div>
        <div class="card-data">
          <span class="price-val">${fmt(total)} ₽</span>
          <span class="profit-val">+${fmt(profit)} ₽</span>
        </div>
        <div class="badges">
          ${clientDebt > 0 ? `<span class="pill p-red">Клиент должен: ${fmt(clientDebt)}</span>` : ''}
          ${masterDebt > 0 ? `<span class="pill p-amber">Мастеру: ${fmt(masterDebt)}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// --- ТВОИ ФУНКЦИИ СИНХРОНИЗАЦИИ ---
async function syncUp() {
  const token = localStorage.getItem(GIST_TOKEN_KEY);
  const id = localStorage.getItem(GIST_ID_KEY);
  if(!token || !id) return;

  updateSyncUI('Выгрузка...', 'wait');
  try {
    const res = await fetch(`https://api.github.com/gists/${id}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${token}` },
      body: JSON.stringify({ files: { 'orders.json': { content: JSON.stringify(orders) } } })
    });
    if(res.ok) updateSyncUI('Облако обновлено', 'ok');
    else throw new Error('Ошибка выгрузки');
  } catch(e) { updateSyncUI(e.message, 'err'); }
}

async function syncDown() {
  const token = localStorage.getItem(GIST_TOKEN_KEY);
  const id = localStorage.getItem(GIST_ID_KEY);
  if(!token || !id) return;

  try {
    const res = await fetch(`https://api.github.com/gists/${id}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    const data = await res.json();
    const file = data.files['orders.json'];
    if(file) {
      orders = JSON.parse(file.content);
      save();
      renderOrders();
      updateSyncUI('Данные загружены', 'ok');
    }
  } catch(e) { updateSyncUI('Ошибка загрузки', 'err'); }
}

function updateSyncUI(text, status) {
  const bar = document.getElementById('sync-status-bar');
  const txt = document.getElementById('sync-status-text');
  txt.textContent = text;
  bar.className = 'sync-status ' + status;
}

function saveGistCreds() {
  localStorage.setItem(GIST_TOKEN_KEY, document.getElementById('gist-token').value);
  localStorage.setItem(GIST_ID_KEY, document.getElementById('gist-id').value);
  syncDown();
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if(id === 'orders') renderOrders();
}

// Инициализация
document.getElementById('gist-token').value = localStorage.getItem(GIST_TOKEN_KEY) || '';
document.getElementById('gist-id').value = localStorage.getItem(GIST_ID_KEY) || '';
syncDown();
renderOrders();
</script>
</body>
</html>

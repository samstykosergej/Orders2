<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Furbis Design</title>
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f12; --surface: #161a1f; --surface2: #1e232a; --surface3: #252c35;
  --border: rgba(255,255,255,0.08); --accent: #3b82f6; --text: #e2e8f0;
  --muted: #94a3b8; --green: #10b981; --amber: #f59e0b; --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Golos Text', sans-serif; padding-bottom: 100px; }
h1, h2, h3, .unbounded { font-family: 'Unbounded', sans-serif; }

/* Офлайн баннер */
.offline-banner {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--red); color: white;
  padding: 8px; text-align: center; font-size: 12px;
  font-weight: 700; z-index: 2000;
}

.header { padding: 24px 16px 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
.header-title { font-family: 'Unbounded'; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

.sync-status { margin: 0 16px 16px; padding: 10px 12px; border-radius: 12px; font-size: 11px; display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.sync-status.ok { color: var(--green); } .sync-status.err { color: var(--red); } .sync-status.wait { color: var(--amber); }

.search-container { padding: 0 16px 16px; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; transition: 0.2s; }
.search-input:focus { border-color: var(--accent); background: var(--surface3); }

/* Bottom Nav */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22, 26, 31, 0.98); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 10px 10px 30px; border-top: 1px solid var(--border); z-index: 1000; }
.nav-item { color: var(--muted); text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 500; transition: 0.2s; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; }

/* Order Card */
.order-card { background: var(--surface); margin: 0 16px 12px; padding: 16px; border-radius: 18px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.order-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; }
.s-work::before { background: var(--amber); } .s-done::before { background: var(--green); }

.card-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.client-name { font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }
.card-items { color: var(--muted); font-size: 13px; margin-bottom: 14px; line-height: 1.4; }

.card-metrics { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px 12px; border-radius: 12px; }
.price-tag { font-weight: 700; font-size: 15px; }
.profit-tag { font-weight: 700; font-size: 14px; color: var(--green); }

.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.pill { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
.p-red { background: rgba(239, 68, 68, 0.12); color: var(--red); }
.p-amber { background: rgba(245, 158, 11, 0.12); color: var(--amber); }

.badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
.b-new { background: var(--accent); color: #fff; }
.b-work { background: var(--amber); color: #000; }
.b-done { background: var(--green); color: #000; }

.page { display: none; padding-top: 10px; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.form-group { padding: 0 16px 20px; }
.label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
input, select, textarea { width: 100%; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 16px; outline: none; font-family: inherit; }
.btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-family: 'Unbounded'; font-size: 14px; transition: 0.2s; text-align: center; display: block; text-decoration: none;}
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); }

.detail-section { background: var(--surface); border-radius: 20px; padding: 20px; margin: 0 16px 16px; border: 1px solid var(--border); }
.item-row { display: grid; grid-template-columns: 1fr 80px 40px; gap: 8px; margin-bottom: 8px; align-items: center; }
.payment-row { display: grid; grid-template-columns: 1fr 40px; gap: 8px; margin-bottom: 8px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 20px; }
.stat-card { background: var(--surface); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 600; }
.stat-val { font-size: 18px; font-weight: 700; font-family: 'Unbounded'; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">FURBI DESIGN</div>
  <div id="orders-count" style="font-size: 12px; color: var(--muted); font-weight: 600;"></div>
</div>

<div id="sync-status-bar" class="sync-status wait">
  <div class="sync-dot"></div>
  <span id="sync-status-text">Инициализация...</span>
</div>

<div id="page-orders" class="page active">
  <div class="search-container">
    <input type="text" id="order-search" class="search-input" placeholder="Поиск клиента или изделия..." oninput="renderOrders()">
  </div>
  <div id="orders-list"></div>
</div>

<div id="page-add" class="page">
  <div class="form-group">
    <label class="label">Клиент</label>
    <input type="text" id="f-client" placeholder="Имя клиента или название">
    <label class="label">Дата завершения (план)</label>
    <input type="date" id="f-dateEnd">
    <button class="btn btn-primary" onclick="addOrder()">Создать заказ</button>
  </div>
</div>

<div id="page-stats" class="page">
  <div class="stats-grid" id="stats-container"></div>
</div>

<div id="page-settings" class="page">
  <div class="form-group">
    <label class="label">GitHub Token</label>
    <input type="password" id="gist-token" placeholder="ghp_xxxxxxxx">
    <label class="label">Gist ID</label>
    <input type="text" id="gist-id" placeholder="ID вашего секретного Gist">
    <button class="btn btn-primary" onclick="saveGistCreds()">Сохранить настройки</button>
    <button class="btn btn-outline" style="margin-top: 12px;" onclick="syncUp()">Принудительная выгрузка ↑</button>
  </div>
</div>

<div id="page-detail" class="page">
  <div id="detail-content"></div>
</div>

<nav class="nav">
  <a href="#" class="nav-item active" onclick="showPage('orders', this)">
    <span class="nav-icon">📋</span><span>Список</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('add', this)">
    <span class="nav-icon">➕</span><span>Создать</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('stats', this)">
    <span class="nav-icon">📊</span><span>Итоги</span>
  </a>
  <a href="#" class="nav-item" onclick="showPage('settings', this)">
    <span class="nav-icon">⚙️</span><span>Облако</span>
  </a>
</nav>

<script>
// --- CORE DATA & STORAGE ---
const KEY = 'furbis_orders';
const GIST_TOKEN_KEY = 'furbis_gist_token';
const GIST_ID_KEY = 'furbis_gist_id';

let orders = JSON.parse(localStorage.getItem(KEY) || '[]');
let currentOrderId = null;

function save() { 
  localStorage.setItem(KEY, JSON.stringify(orders)); 
  renderOrders();
  renderStats();
}

function fmt(n) { return Math.round(n || 0).toLocaleString('ru-RU'); }

function getOrderMetrics(o) {
  const total = (o.items || []).reduce((s, i) => s + Number(i.price || 0), 0);
  const materials = (o.items || []).reduce((s, i) => s + Number(i.material || 0), 0);
  const masterBase = Number(o.masterTotal || 0);
  const tax = total * 0.06;
  const profit = total - masterBase - materials - tax;
  const clientPaid = (o.clientPayments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  const masterPaid = (o.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  return { total, profit, clientDebt: total - clientPaid, masterDebt: masterBase - masterPaid };
}

function renderOrders() {
  const container = document.getElementById('orders-list');
  const query = document.getElementById('order-search').value.toLowerCase();
  const filtered = orders.filter(o => o.client.toLowerCase().includes(query) || (o.items && o.items.some(i => i.name.toLowerCase().includes(query))));
  document.getElementById('orders-count').textContent = `Заказов: ${filtered.length}`;
  if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted);">Ничего не найдено</div>'; return; }

  container.innerHTML = filtered.sort((a,b) => new Date(b.date || 0) - new Date(a.date || 0)).map(o => {
    const m = getOrderMetrics(o);
    const statusClass = o.status === 'work' ? 's-work' : (o.status === 'done' ? 's-done' : '');
    return `
      <div class="order-card ${statusClass}" onclick="openDetail('${o.id}')">
        <div class="card-top"><span class="client-name">${o.client}</span><span class="badge b-${o.status}">${o.status==='work'?'В работе':(o.status==='done'?'Готов':'Новый')}</span></div>
        <div class="card-items">${(o.items || []).map(i => i.name).join(', ') || 'Состав не указан'}</div>
        <div class="card-metrics"><span class="price-tag">${fmt(m.total)} ₽</span><span class="profit-tag">+${fmt(m.profit)} ₽</span></div>
        <div class="pills">${m.clientDebt > 0 ? `<span class="pill p-red">Долг: ${fmt(m.clientDebt)}</span>` : ''}${m.masterDebt > 0 ? `<span class="pill p-amber">Мастеру: ${fmt(m.masterDebt)}</span>` : ''}</div>
      </div>`;
  }).join('');
}

function openDetail(id) { currentOrderId = id; showPage('detail'); renderDetail(); }

function renderDetail() {
  const o = orders.find(x => x.id === currentOrderId);
  const container = document.getElementById('detail-content');
  container.innerHTML = `
    <div class="form-group">
      <label class="label">Клиент</label><input type="text" value="${o.client}" onchange="updateOrder('client', this.value)">
      <label class="label">Статус</label>
      <select onchange="updateOrder('status', this.value)">
        <option value="new" ${o.status==='new'?'selected':''}>Новый</option>
        <option value="work" ${o.status==='work'?'selected':''}>В работе</option>
        <option value="done" ${o.status==='done'?'selected':''}>Готов</option>
      </select>
    </div>
    <div class="detail-section">
      <h3 style="margin-bottom:15px; font-size:14px;">ПОЗИЦИИ</h3>
      ${(o.items || []).map((item, idx) => `<div class="item-row"><input type="text" value="${item.name}" onchange="updateItem(${idx},'name',this.value)"><input type="number" value="${item.price}" onchange="updateItem(${idx},'price',this.value)"><button class="btn btn-danger" onclick="removeItem(${idx})" style="padding:10px; margin:0">×</button></div>`).join('')}
      <button class="btn btn-outline" style="margin-top:10px;" onclick="addItem()">+ Добавить товар</button>
    </div>
    <div class="detail-section">
      <h3 style="margin-bottom:15px; font-size:14px;">МАСТЕР (База: ${o.masterTotal || 0} ₽)</h3>
      <input type="number" value="${o.masterTotal || 0}" placeholder="Итого мастеру" onchange="updateOrder('masterTotal', this.value)">
      <button class="btn btn-outline" onclick="addPayment('payments')">+ Выплата мастеру</button>
    </div>
    <div class="detail-section">
      <h3 style="margin-bottom:15px; font-size:14px;">ПЛАТЕЖИ КЛИЕНТА</h3>
      <button class="btn btn-outline" onclick="addPayment('clientPayments')">+ Принять платеж</button>
    </div>
    <div style="padding: 0 16px 40px;"><button class="btn btn-danger" onclick="deleteOrder()">Удалить заказ</button><button class="btn btn-outline" style="margin-top:10px;" onclick="showPage('orders')">← Назад</button></div>`;
}

function updateOrder(k, v) { orders.find(x => x.id === currentOrderId)[k] = v; save(); renderDetail(); }
function updateItem(idx, k, v) { orders.find(x => x.id === currentOrderId).items[idx][k] = k==='price'?Number(v):v; save(); renderDetail(); }
function addItem() { const o = orders.find(x => x.id === currentOrderId); if(!o.items) o.items = []; o.items.push({name:'Новый товар', price:0}); save(); renderDetail(); }
function removeItem(idx) { orders.find(x => x.id === currentOrderId).items.splice(idx,1); save(); renderDetail(); }
function addPayment(type) { const a = prompt('Сумма:'); if(!a) return; const o = orders.find(x => x.id === currentOrderId); if(!o[type]) o[type] = []; o[type].push({amount:Number(a), date:new Date().toISOString()}); save(); renderDetail(); }
function deleteOrder() { if(!confirm('Удалить?')) return; orders = orders.filter(x => x.id !== currentOrderId); save(); showPage('orders'); }

function addOrder() {
  const c = document.getElementById('f-client').value; if(!c) return;
  orders.push({id:Date.now().toString(), client:c, date:new Date().toISOString(), status:'new', items:[], payments:[], clientPayments:[], masterTotal:0});
  save(); document.getElementById('f-client').value=''; showPage('orders', document.querySelector('.nav-item'));
}

function renderStats() {
  const cont = document.getElementById('stats-container');
  let rev = 0, prof = 0;
  orders.forEach(o => { const m = getOrderMetrics(o); rev += m.total; prof += m.profit; });
  cont.innerHTML = `<div class="stat-card" style="grid-column:span 2;"><div class="stat-label">Выручка</div><div class="stat-val" style="color:var(--accent)">${fmt(rev)} ₽</div></div><div class="stat-card" style="grid-column:span 2;"><div class="stat-label">Прибыль</div><div class="stat-val" style="color:var(--green)">${fmt(prof)} ₽</div></div>`;
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
  if(id==='orders') renderOrders(); if(id==='stats') renderStats();
}

async function syncUp() {
  const t = localStorage.getItem(GIST_TOKEN_KEY), i = localStorage.getItem(GIST_ID_KEY);
  if(!t || !i) return updateSyncUI('Нет настроек','err');
  updateSyncUI('Выгрузка...','wait');
  try {
    const res = await fetch(`https://api.github.com/gists/${i}`, { method:'PATCH', headers:{'Authorization':`token ${t}`}, body:JSON.stringify({files:{'orders.json':{content:JSON.stringify(orders)}}})});
    if(res.ok) updateSyncUI('Облако обновлено','ok');
    else throw 1;
  } catch(e) { updateSyncUI('Ошибка выгрузки','err'); }
}

async function syncDown() {
  const t = localStorage.getItem(GIST_TOKEN_KEY), i = localStorage.getItem(GIST_ID_KEY);
  if(!t || !i) return updateSyncUI('Настройте облако','wait');
  updateSyncUI('Синхронизация...','wait');
  try {
    const res = await fetch(`https://api.github.com/gists/${i}`, {headers:{'Authorization':`token ${t}`}});
    const d = await res.json();
    if(d.files && d.files['orders.json']) { orders = JSON.parse(d.files['orders.json'].content); save(); updateSyncUI('Синхронизировано','ok'); }
  } catch(e) { updateSyncUI('Ошибка загрузки','err'); }
}

function updateSyncUI(t, s) { document.getElementById('sync-status-text').textContent = t; document.getElementById('sync-status-bar').className = 'sync-status ' + s; }
function saveGistCreds() { localStorage.setItem(GIST_TOKEN_KEY, document.getElementById('gist-token').value); localStorage.setItem(GIST_ID_KEY, document.getElementById('gist-id').value); syncDown(); }

// ---- ОФЛАЙН ЛОГИКА ----
function updateOnlineStatus() {
  let b = document.getElementById('offline-banner');
  if (!navigator.onLine) {
    if (!b) { b = document.createElement('div'); b.id = 'offline-banner'; b.className = 'offline-banner'; b.textContent = 'Optionally: 📵 Офлайн — данные сохраняются локально'; document.body.appendChild(b); }
  } else { if (b) b.remove(); }
}
window.addEventListener('online', updateOnlineStatus); window.addEventListener('offline', updateOnlineStatus); updateOnlineStatus();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').then(r => console.log('SW OK')).catch(e => console.log('SW ERR')); });
}

document.getElementById('gist-token').value = localStorage.getItem(GIST_TOKEN_KEY) || '';
document.getElementById('gist-id').value = localStorage.getItem(GIST_ID_KEY) || '';
syncDown(); renderOrders();
</script>
</body>
</html>

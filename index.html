<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Furbis Design</title>

  <link rel="icon" href="logo.png" />
  <link rel="manifest" href="manifest.json" />

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('orders')">Заказы</button>
  <button class="nav-btn" onclick="showPage('stats')">Итоги</button>
  <button class="nav-btn" onclick="showPage('sync')">Синх</button>
</nav>

<section class="page active" id="page-orders">
  <div class="page-header">
    <h1 class="page-title">Furbis Design</h1>
    <button class="btn-add" onclick="openNew()">+</button>
  </div>

  <input class="search" placeholder="🔍 Поиск заказов">

  <div id="orders-list"></div>
</section>

<section class="page" id="page-stats">
  <div class="page-header">
    <h1 class="page-title">Финансы</h1>
  </div>

  <div id="stats-content"></div>
</section>

<section class="page" id="page-sync">
  <div class="page-header">
    <h1 class="page-title">Синхронизация</h1>
  </div>

  <div class="sync-box">
    GitHub Sync подключается через ваш существующий код.
  </div>
</section>

<script src="app.js"></script>

</body>
</html>
